{% extends 'shop/base.html' %}
{% block content %}
    <section class="section auth-card">
        <h2>Login</h2>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn" type="submit">Login</button>
        </form>
        <p>Don't have an account? <a class="text-link" href="{% url 'register' %}">Register</a></p>
    </section>
{% endblock %}
